<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Over Here!</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <!-- ═══════════════════════════════════════════════
         MENU SCREEN
    ═══════════════════════════════════════════════ -->
    <div id="menu-screen" class="screen active">
      <div class="menu-bg-grid"></div>
      <div class="menu-scanlines"></div>

      <div class="menu-content">
        <div class="title-block">
          <div class="title-eyebrow">● ARCADE NETWORK ●</div>
          <h1 class="game-title">
            <span class="title-over">OVER</span>
            <span class="title-here">HERE!</span>
          </h1>
          <div class="title-tagline">A TWO-PLAYER COOPERATIVE MAZE ESCAPE</div>
        </div>

        <div class="role-selector">
          <button id="btn-host" class="role-btn role-host">
            <span class="role-icon">👁</span>
            <span class="role-label">HOST</span>
            <span class="role-desc">Viewer · Guide your partner</span>
          </button>
          <div class="role-divider">— VS —</div>
          <button id="btn-join" class="role-btn role-join">
            <span class="role-icon">🕹</span>
            <span class="role-label">JOIN</span>
            <span class="role-desc">Mover · Navigate the maze</span>
          </button>
        </div>

        <!-- Host Panel -->
        <div id="host-panel" class="connect-panel hidden">
          <div class="panel-title">YOUR ROOM CODE</div>
          <div id="room-code-display" class="room-code">••••••</div>
          <div class="panel-status" id="host-status">⏳ Generating code…</div>
          <button id="btn-copy-code" class="small-btn">COPY CODE</button>
        </div>

        <!-- Join Panel -->
        <div id="join-panel" class="connect-panel hidden">
          <div class="panel-title">ENTER ROOM CODE</div>
          <input id="room-code-input" class="code-input" type="text" maxlength="8" placeholder="XXXXXXXX" autocomplete="off" spellcheck="false" />
          <button id="btn-connect" class="connect-btn">CONNECT →</button>
          <div class="panel-status" id="join-status"></div>
        </div>

        <div class="menu-footer">USE WASD / ARROW KEYS · ESC TO PAUSE · VOICE CHAT AUTO-ENABLED</div>
      </div>
    </div>

    <!-- ═══════════════════════════════════════════════
         GAME SCREEN
    ═══════════════════════════════════════════════ -->
    <div id="game-screen" class="screen hidden">
      <canvas id="game-canvas"></canvas>

      <!-- HUD -->
      <div id="hud">
        <div id="hud-left">
          <div class="hud-label">LEVEL</div>
          <div id="hud-level" class="hud-value">1</div>
        </div>
        <div id="hud-center">
          <div class="hud-label">TIME</div>
          <div id="hud-timer" class="hud-value">00:00</div>
        </div>
        <div id="hud-right">
          <div class="hud-label">ROLE</div>
          <div id="hud-role" class="hud-value">—</div>
        </div>
      </div>

      <!-- Voice indicator -->
      <div id="voice-indicator" class="hidden">
        <span class="voice-dot"></span> VOICE LIVE
      </div>

      <!-- Pause overlay -->
      <div id="pause-overlay" class="overlay hidden">
        <div class="overlay-box">
          <div class="overlay-title">PAUSED</div>
          <div class="overlay-sub">PRESS ESC TO RESUME</div>
        </div>
      </div>

      <!-- Win overlay -->
      <div id="win-overlay" class="overlay hidden">
        <div class="overlay-box win">
          <div class="overlay-title">ESCAPED!</div>
          <div id="win-time" class="overlay-sub"></div>
          <button id="btn-next-level" class="connect-btn" style="margin-top:24px">NEXT LEVEL →</button>
        </div>
      </div>

      <!-- Death overlay -->
      <div id="death-overlay" class="overlay hidden">
        <div class="overlay-box death">
          <div class="overlay-title">CAUGHT!</div>
          <div class="overlay-sub">YOU WERE SPOTTED…</div>
          <button id="btn-retry" class="connect-btn" style="margin-top:24px">RETRY</button>
        </div>
      </div>
    </div>

    <script type="module" src="main.js"></script>
  </body>
</html>
